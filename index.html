function actIcon(name){ return ACTIVITY_ICONS[name] || "🏃"; }

// ── time helpers ───────────────────────────────────────────────
function todayStr(){
  const now = new Date();
  const ist = new Date(now.getTime() + 5.5*60*60*1000);
  if(ist.getUTCHours() < 4) ist.setUTCDate(ist.getUTCDate() - 1);
  return ist.toISOString().split("T")[0];
}
function fmtDate(d){ return new Date(d+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"}); }
function fmtTime(){ return new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}); }
function displayTime(t){
  if(!t) return "";
  if(/[AP]M/i.test(t)) return t;
  const [hh,mm] = t.split(":").map(Number);
  return `${hh%12||12}:${String(mm).padStart(2,"0")} ${hh>=12?"PM":"AM"}`;
}

// ── API ────────────────────────────────────────────────────────
async function apiFetch(from, to){
  const r = await fetch(`${URL_BASE}/meals?meal_date=gte.${from}&meal_date=lte.${to}&order=logged_at.asc`,{headers:HDRS});
  if(!r.ok) throw new Error(r.status+" "+await r.text());
  return r.json();
}
async function apiFetchActivities(from, to){
  const r = await fetch(`${URL_BASE}/activities?activity_date=gte.${from}&activity_date=lte.${to}&order=logged_at.asc`,{headers:HDRS});
  if(!r.ok) return [];
  return r.json();
}
async function apiFetchCheatDays(){
  try{
    const r = await fetch(`${URL_BASE}/cheat_days?order=date.desc`,{headers:HDRS});
    if(!r.ok) return new Set();
    return new Set((await r.json()).map(x=>x.date));
  } catch{ return new Set(); }
}
async function apiFetchSettings(){
  try{
    const r = await fetch(`${URL_BASE}/settings`,{headers:HDRS});
    if(!r.ok) return {};
    const rows = await r.json();
    return Object.fromEntries(rows.map(x=>[x.key, x.value]));
  } catch{ return {}; }
}
async function apiFetchSteps(from, to){
  try{
    const r = await fetch(`${URL_BASE}/daily_steps?step_date=gte.${from}&step_date=lte.${to}&order=step_date.asc`,{headers:HDRS});
    if(!r.ok) return {};
    const rows = await r.json();
    return Object.fromEntries(rows.map(x=>[x.step_date, x.steps]));
  } catch{ return {}; }
}
async function apiInsert(meal){
  const r = await fetch(`${URL_BASE}/meals`,{method:"POST",headers:{...HDRS,"Prefer":"return=representation"},body:JSON.stringify(meal)});
  if(!r.ok) throw new Error(r.status+" "+await r.text());
  return r.json();
}
async function apiDeleteToday(){
  const r = await fetch(`${URL_BASE}/meals?meal_date=eq.${todayStr()}`,{method:"DELETE",headers:{...HDRS,"Prefer":"return=minimal"}});
  if(!r.ok) throw new Error(r.status+" "+await r.text());
}

// ── tiny components ────────────────────────────────────────────
function Ring({value,target,color,track,size=88,sw=8}){
  const r=(size-sw)/2, circ=2*Math.PI*r;
  const rawPct=value/target, isOver=rawPct>1;
  const mainPct=Math.min(rawPct,1), overPct=isOver?Math.min(rawPct-1,1):0;
  const textColor=isOver?"#ff9f43":color;
  const overflowArc=isOver&&overPct>0?h("circle",{cx:size/2,cy:size/2,r,fill:"none",
    stroke:color,strokeWidth:sw,strokeLinecap:"round",
    strokeDasharray:circ,strokeDashoffset:circ*(1-overPct),
    transform:`rotate(-90 ${size/2} ${size/2})`,
    style:{transition:"stroke-dashoffset 0.8s ease"}}):null;
  return h("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block"}},
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:track,strokeWidth:sw}),
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:sw,
      strokeLinecap:isOver?"butt":"round",
      strokeDasharray:circ,strokeDashoffset:circ*(1-mainPct),
      transform:`rotate(-90 ${size/2} ${size/2})`,
      style:{transition:"stroke-dashoffset 0.8s ease",opacity:isOver?0.75:1}}),
    overflowArc,
    h("text",{x:size/2,y:size/2+5,textAnchor:"middle",fontSize:"12",fontWeight:"500",fill:textColor},
      Math.round(rawPct*100)+"%")
  );
}

}

// ── MonthCalendar ──────────────────────────────────────────────
function MonthCalendar({ month, onPrev, onNext, getCellBg, getCellContent, today, minMonth, onDayClick }){
  const [y, mo] = month.split("-").map(Number);
  const monthLabel = new Date(y, mo-1, 1).toLocaleDateString("en-IN", {month:"long", year:"numeric"});
  const firstDow = (new Date(y, mo-1, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(y, mo, 0).getDate();
  const moStr = String(mo).padStart(2,"0");
  const dayKeys = Array.from({length:daysInMonth}, (_,i)=>`${y}-${moStr}-${String(i+1).padStart(2,"0")}`);
  const cells = [...Array(firstDow).fill(null), ...dayKeys];
  const curMonth = today.slice(0,7);
  const atMax = month >= curMonth;
  const atMin = !!minMonth && month <= minMonth;
  const navBtn = (lbl, cb, dis) => h("button", {onClick:cb, disabled:dis, style:{
    background:"transparent", border:`0.5px solid ${D.border}`,
    color:dis?D.hint:D.muted, borderRadius:8, padding:"4px 16px",
    fontSize:17, cursor:dis?"not-allowed":"pointer", lineHeight:1,
  }}, lbl);
  return h("div", null,
    h("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      navBtn("‹", onPrev, atMin),
      h("span", {style:{fontSize:13,fontWeight:500,color:D.text}}, monthLabel),
      navBtn("›", onNext, atMax)
    ),
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}},
      ...["M","T","W","T","F","S","S"].map((d,i)=>h("div",{key:i,style:{textAlign:"center",fontSize:9,color:D.muted,fontWeight:500}},d))
    ),
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
      ...cells.map((key,i)=>{
        if(!key) return h("div",{key:"e"+i,style:{aspectRatio:"1"}});
        const dayNum = parseInt(key.split("-")[2]);
        const bg = getCellBg(key);
        const content = getCellContent ? getCellContent(key) : null;
        const isToday = key===today, isFuture = key>today;
        const clickable = onDayClick && !isFuture;
        return h("div",{key, title:key, onClick:clickable?()=>onDayClick(key):undefined, style:{
          aspectRatio:"1", borderRadius:6,
          background: isFuture?"transparent":bg,
          border: isToday?`2px solid ${D.accent}`:isFuture?`0.5px solid ${D.hint}`:"none",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"space-between",
          padding:"3px 2px 2px",
          cursor: clickable?"pointer":"default",
        }},
          h("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",width:"100%"}},
            !isFuture&&content&&h("span",{style:{fontSize:"clamp(9px,1.9vw,14px)",lineHeight:1.1,textAlign:"center"}},content)
          ),
          h("div",{style:{
            fontSize:"clamp(6px,1.2vw,9px)", lineHeight:1, fontWeight:500,
            color: isFuture?"#1e1e1b":bg===D.hint?"#3a3a36":"rgba(255,255,255,0.45)",
          }}, dayNum)
        );
      })
    )
  );
}

// ── streak helpers ─────────────────────────────────────────────
function calcNutStreak(byDate, cheatDays){
  const GOOD_PRO = TARGETS.protein * 0.6;
  const isGoodDay = k => {
    if(cheatDays.has(k)) return true;
    const m = byDate[k]||[];
    return m.length >= 2 && m.reduce((s,x)=>s+(x.protein||0),0) >= GOOD_PRO;
  };
  const today = todayStr();
  const todayDt = new Date(today+"T12:00:00");
  let streak=0;
  const startI = isGoodDay(today)?0:1;
  for(let i=startI;i<90;i++){
    const d=new Date(todayDt); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    if(isGoodDay(k)) streak++; else break;
  }
  return streak;
}

function calcActStreak(actByDate){
  const isValid = k => (actByDate[k]||[]).some(a=>a.calories_burned>=ACT_MIN);
  const today = todayStr();
  const todayDt = new Date(today+"T12:00:00");
  let streak=0;
  const startI = isValid(today)?0:1;
  for(let i=startI;i<90;i++){
    const d=new Date(todayDt); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    if(isValid(k)) streak++; else break;
  }
  return streak;
}

          h("button",{onClick:()=>goDate(-1),style:{background:"transparent",border:`0.5px solid ${D.border}`,color:D.muted,borderRadius:8,padding:"4px 13px",fontSize:16,lineHeight:1}},"‹"),
          h("input",{type:"date",value:viewDate,max:today,onChange:e=>e.target.value&&setVD(e.target.value),
            style:{background:D.card,border:`0.5px solid ${D.border}`,color:D.text,borderRadius:8,padding:"5px 10px",fontSize:12,fontFamily:"inherit",flex:1,colorScheme:"dark"}}),
          viewDate<today&&h("button",{onClick:()=>setVD(today),style:{fontSize:11,padding:"5px 12px",borderRadius:8,background:D.accent,color:D.accentText,border:"none",fontWeight:600,whiteSpace:"nowrap"}},"Today"),
          h("button",{onClick:()=>goDate(1),disabled:viewDate>=today,style:{background:"transparent",border:`0.5px solid ${D.border}`,color:viewDate>=today?D.hint:D.muted,borderRadius:8,padding:"4px 13px",fontSize:16,lineHeight:1}},"›")
        ),
        // Streak + burn cards
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
          h("div",{style:{...card,marginBottom:0}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Activity streak"),
            h("div",{style:{fontSize:24,fontWeight:600,color:D.text}},actStreak,
              h("span",{style:{fontSize:12,color:D.muted,fontWeight:400,marginLeft:4}},"days")),
            h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},`❄️ ${actFreezeBal}/2 freezes`)
          ),
          h("div",{style:{...card,marginBottom:0}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Today's burn"),
            h("div",{style:{fontSize:24,fontWeight:600,color:actTotals.burned>0?COLORS.act:D.muted}},
              actTotals.burned,h("span",{style:{fontSize:12,color:D.muted,fontWeight:400,marginLeft:2}},"kcal")),
            h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},
              actTotals.valid>0?`${actTotals.valid} valid activit${actTotals.valid===1?"y":"ies"} ✓`:"No valid activity yet")
          )
        ),
        // Steps today
        (()=>{
          const todaySteps = stepsData[viewDate] ?? null;
          const stepPct = todaySteps!==null ? Math.min((todaySteps/STEP_TARGET)*100,100) : 0;
          const stepColor = todaySteps===null?D.muted:todaySteps>=STEP_TARGET?D.accent:todaySteps>=STEP_TARGET*0.7?"#e8a84a":COLORS.act;
          return h("div",{style:card},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h("div",{style:sHead},"Steps"),
              todaySteps===null&&h("span",{style:{fontSize:10,color:D.muted,marginTop:1}},"sync via iOS Shortcut")
            ),
            todaySteps!==null?h("div",null,
              h("div",{style:{display:"flex",alignItems:"baseline",gap:6,marginBottom:8}},
                h("span",{style:{fontSize:28,fontWeight:600,color:stepColor}},todaySteps.toLocaleString()),
                h("span",{style:{fontSize:12,color:D.muted}},`/ ${STEP_TARGET.toLocaleString()} steps`),
                todaySteps>=STEP_TARGET&&h("span",{style:{fontSize:12,color:D.accent,marginLeft:4}},"✓")
              ),
              h("div",{style:{height:6,background:D.hint,borderRadius:3,overflow:"hidden"}},
                h("div",{style:{width:`${stepPct}%`,height:"100%",background:stepColor,borderRadius:3,transition:"width 0.6s ease"}})
              )
            ):h("div",{style:{fontSize:13,color:D.muted,padding:"6px 0"}},
              "👟 No step data yet. Set up iOS Shortcut to sync Apple Health steps automatically."
            )
          );
        })(),
        // Activities for this date
        h("div",{style:card},
          h("div",{style:sHead},viewDate===today?"Today's activities":fmtDate(viewDate)+" — activities"),
          acts.length===0
            ?h(Empty,{icon:"🏃",text:viewDate===today?"No activities logged yet.\nUse /workout in the bot to log one.":"No activities on this day."})
            :acts.map((a,i)=>h(ActivityRow,{key:a.id||i,act:a}))
        )
      ),

      // ── Activity: Log ─────────────────────────────────────
      actTab==="log"&&h("div",null,
        Object.keys(actByDate).length===0
          ?h("div",{style:card},h(Empty,{icon:"🏃",text:"Your full activity history will appear here."}))
          :Object.entries(actByDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,dayActs])=>{
              const totalBurned=dayActs.reduce((s,a)=>s+(a.calories_burned||0),0);
              const isValid=dayActs.some(a=>(a.calories_burned||0)>=ACT_MIN);
              const isToday=date===today, open=actExp.has(date);
              const icons=[...new Set(dayActs.map(a=>actIcon(a.activity)))].slice(0,4).join(" ");
              return h("div",{key:date,style:{...card,border:`0.5px solid ${isToday?D.accent:D.border}`,marginBottom:8}},
                h("div",{onClick:()=>toggleActDay(date),style:{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:open?10:0}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                    h("span",{style:{fontSize:13,color:D.muted,transition:"transform 0.2s",display:"inline-block",transform:open?"rotate(90deg)":"rotate(0deg)"}},"›"),
                    h("span",{style:{fontSize:13,fontWeight:600,color:isToday?D.accent:D.text}},fmtDate(date)),
                    isToday&&h("span",{style:{fontSize:10,color:D.accentText,background:D.accent,borderRadius:6,padding:"1px 7px",fontWeight:600}},"Today"),
                    h("span",{style:{fontSize:13,marginLeft:2}},icons)
                  ),
                  h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                    h(Pill,{label:`${totalBurned} kcal`,color:isValid?COLORS.act:D.muted,bg:isValid?COLORS.actBg:D.hint}),
                    isValid&&h("span",{style:{fontSize:11,color:COLORS.act}},"✓")
                  )
                ),
                open&&h("div",null,...dayActs.map((a,i)=>h(ActivityRow,{key:a.id||i,act:a})))
              );
            })
      ),

      // ── Activity: History ─────────────────────────────────
      actTab==="history"&&h("div",null,
        // Weekly calories burned
        h("div",{style:card},
          h("div",{style:sHead},"Calories burned — last 7 days"),
          ...last7.map(key=>{
            const burned=(actByDate[key]||[]).reduce((s,a)=>s+(a.calories_burned||0),0);
            const pct=Math.min((burned/Math.max(ACT_GOAL,1))*100,100);
            const valid=(actByDate[key]||[]).some(a=>a.calories_burned>=ACT_MIN);
            const isToday=key===today;
            const icons=[...new Set((actByDate[key]||[]).map(a=>actIcon(a.activity)))].slice(0,3).join(" ");
            return h("div",{key,style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
              h("div",{style:{width:46,flexShrink:0}},
                h("span",{style:{fontSize:11,color:isToday?D.accent:D.muted,fontWeight:isToday?600:400}},
                  new Date(key+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short"}))),
              h("div",{style:{flex:1,height:6,background:D.hint,borderRadius:3,overflow:"hidden"}},
                h("div",{style:{width:`${pct}%`,height:"100%",background:valid?"#a78bfa":"#3a3a36",borderRadius:3,transition:"width 0.6s ease"}})),
              h("div",{style:{width:80,flexShrink:0,textAlign:"right",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}},
                burned>0?h(Fragment,null,
                  icons&&h("span",{style:{fontSize:11}},icons),
                  h("span",{style:{fontSize:11,color:D.muted}},`${burned}`)
                ):h("span",{style:{fontSize:11,color:"#2a2a26"}},"—"))
            );
          }),
          h("div",{style:{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}},
            ...[["#a78bfa","≥150 kcal (valid)"],["#3a3a36","< 150 kcal"],["#2a2a26","No activity"]]
              .map(([color,label])=>h("div",{key:label,style:{display:"flex",alignItems:"center",gap:4}},
                h("div",{style:{width:10,height:6,borderRadius:3,background:color}}),
                h("span",{style:{fontSize:10,color:D.muted}},label)))
          )
        ),
        // Steps chart
        Object.keys(stepsData).length>0&&h("div",{style:card},
          h("div",{style:sHead},"Steps — last 7 days"),
          ...last7.map(key=>{
            const steps=stepsData[key]||0, pct=Math.min((steps/STEP_TARGET)*100,100), hit=steps>=STEP_TARGET;
            return h("div",{key,style:{display:"flex",alignItems:"center",gap:10,marginBottom:9}},
              h("span",{style:{fontSize:11,color:key===today?D.accent:D.muted,fontWeight:key===today?600:400,width:46,flexShrink:0}},
                new Date(key+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short"})),
              h("div",{style:{flex:1,height:6,background:D.hint,borderRadius:3,overflow:"hidden"}},
                h("div",{style:{width:`${pct}%`,height:"100%",background:hit?D.accent:COLORS.act,borderRadius:3}})),
              h("span",{style:{fontSize:11,color:D.muted,width:72,textAlign:"right",flexShrink:0}},
                steps>0?`${steps.toLocaleString()}`:"—")
            );
          })
        ),
        // Monthly activity calendar
        h("div",{style:card},
          h("div",{style:sHead},"Monthly activity"),
          h(MonthCalendar,{
            month: actCalMonth,
            onPrev: ()=>navMonth(setActCal,-1),
            onNext: ()=>navMonth(setActCal,+1),
            today, minMonth: minCalMonth,
            onDayClick: key=>{ setVD(key); setActTab("today"); },
            getCellBg: key=>{
              const dayActs=actByDate[key]||[];
              if(!dayActs.length) return D.hint;
              const burned=dayActs.reduce((s,a)=>s+(a.calories_burned||0),0);
              if(burned>=500) return "#6b4fa0";
              if(burned>=300) return "#7a5aaf";
              if(burned>=ACT_MIN) return "#5a4080";
              return "#2d2038";
            },
            getCellContent: key=>{
              const dayActs=actByDate[key]||[];
              if(!dayActs.length) return null;
              const sorted=[...dayActs].sort((a,b)=>(b.calories_burned||0)-(a.calories_burned||0));
              const icons=[]; const seen=new Set();
              for(const a of sorted){ const ic=actIcon(a.activity); if(!seen.has(ic)){icons.push(ic);seen.add(ic);} if(icons.length>=2) break; }
              return icons.join("");
            },
          }),
          h("div",{style:{display:"flex",gap:12,marginTop:12,flexWrap:"wrap"}},
            ...[["#6b4fa0","≥500 kcal"],["#7a5aaf","≥300 kcal"],["#5a4080","≥150 kcal"],[D.hint,"No activity"]]
              .map(([color,label])=>h("div",{key:label,style:{display:"flex",alignItems:"center",gap:4}},
                h("div",{style:{width:9,height:9,borderRadius:2,background:color}}),
                h("span",{style:{fontSize:10,color:D.muted}},label)))
          )
        )
      )
    ),

    // ═══════════════════════════════════════════════════════
    // SUMMARY TAB
    // ═══════════════════════════════════════════════════════
    !loading&&mainTab==="summary"&&h("div",{className:"fade"},
      // Both streaks
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        h("div",{style:{...card,marginBottom:0,borderColor:nutStreak>0?"#3a5a20":D.border}},
          h("div",{style:{fontSize:11,color:D.muted,marginBottom:6}},"🥗 Nutrition streak"),
          h("div",{style:{fontSize:28,fontWeight:600,color:nutStreak>0?COLORS.protein:D.muted}},
            nutStreak,h("span",{style:{fontSize:12,fontWeight:400,color:D.muted,marginLeft:3}},"days")),
          h("div",{style:{fontSize:11,color:D.muted,marginTop:3}},
            `❄️ ${freezeBal}/2 freezes · good day = ≥2 meals + ≥87g pro`)
        ),
        h("div",{style:{...card,marginBottom:0,borderColor:actStreak>0?"#3a2a5a":D.border}},
          h("div",{style:{fontSize:11,color:D.muted,marginBottom:6}},"🏃 Activity streak"),
          h("div",{style:{fontSize:28,fontWeight:600,color:actStreak>0?COLORS.act:D.muted}},
            actStreak,h("span",{style:{fontSize:12,fontWeight:400,color:D.muted,marginLeft:3}},"days")),
          h("div",{style:{fontSize:11,color:D.muted,marginTop:3}},
            `❄️ ${actFreezeBal}/2 freezes · valid = ≥150 kcal burned`)
        )
      ),

      // Compact macro rings
      h("div",{style:{...card,padding:"1.25rem 1rem"}},
        h("div",{style:{...sHead,marginBottom:12}},"Today — nutrition"),
        h("div",{style:{display:"flex",justifyContent:"space-around",gap:8}},
          ...[
            {key:"cal",    label:"Cal",   unit:"kcal",color:COLORS.cal,    track:COLORS.calBg},
            {key:"protein",label:"Pro",   unit:"g",   color:COLORS.protein,track:COLORS.proteinBg},
            {key:"carbs",  label:"Carbs", unit:"g",   color:COLORS.carbs,  track:COLORS.carbsBg},
            {key:"fat",    label:"Fat",   unit:"g",   color:COLORS.fat,    track:COLORS.fatBg},
            {key:"fiber",  label:"Fiber", unit:"g",   color:COLORS.fiber,  track:COLORS.fiberBg},
          ].map(({key,label,unit,color,track})=>
            h("div",{key,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:"1 1 0"}},
              h(Ring,{value:totals[key],target:TARGETS[key],color,track,size:60,sw:6}),
              h("div",{style:{fontSize:10,color:D.muted}},label)
            )
          )
        ),
        h("div",{style:{fontSize:12,color:D.muted,textAlign:"center",marginTop:10}},
          `${Math.round(totals.cal)} / ${TARGETS.cal} kcal consumed · `+
          `${Math.round(totals.protein)}g protein`)
      ),

      // Activity summary
      h("div",{style:card},
        h("div",{style:{...sHead,marginBottom:12}},"Today — activity"),
        acts.length===0
          ?h("div",{style:{fontSize:13,color:D.muted,padding:"8px 0"}},"No activities logged today.")
          :h("div",null,
              acts.map((a,i)=>h("div",{key:a.id||i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:i<acts.length-1?`0.5px solid ${D.border}`:"none"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("span",{style:{fontSize:16}},actIcon(a.activity)),
                  h("span",{style:{fontSize:13,color:D.text}},
                    a.activity.charAt(0).toUpperCase()+a.activity.slice(1),
                    h("span",{style:{fontSize:11,color:D.muted,marginLeft:6}},`${a.duration_minutes}min · ${a.intensity}`)
                  )
                ),
                h("span",{style:{fontSize:13,fontWeight:500,color:(a.calories_burned||0)>=ACT_MIN?COLORS.act:D.muted}},
                  `${a.calories_burned} kcal`)
              ))
          )
      ),

      // Net calories card
      (()=>{
        const net = Math.round(totals.cal - actTotals.burned);
        const netColor = net > TARGETS.cal ? "#ff9f43" : net < TARGETS.cal * 0.5 ? COLORS.protein : COLORS.cal;
        return h("div",{style:{...card,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Consumed"),
            h("div",{style:{fontSize:18,fontWeight:600,color:COLORS.cal}},Math.round(totals.cal)),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          ),
          h("div",{style:{textAlign:"center",borderLeft:`0.5px solid ${D.border}`,borderRight:`0.5px solid ${D.border}`}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Burned"),
            h("div",{style:{fontSize:18,fontWeight:600,color:COLORS.act}},actTotals.burned),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          ),
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Net"),
            h("div",{style:{fontSize:18,fontWeight:600,color:netColor}},net),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          )
        );
      })(),

      // Meal list (compact)
      viewMeals.length>0&&h("div",{style:card},
        h("div",{style:sHead},`${viewMeals.length} meal${viewMeals.length!==1?"s":""} logged`),
        viewMeals.map((m,i)=>
          h("div",{key:m.id||i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<viewMeals.length-1?`0.5px solid ${D.border}`:"none"}},
            h("div",null,
              h("div",{style:{fontSize:13,color:D.text}},m.name),
              h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},
                `${Math.round(m.cal)} kcal · ${Math.round(m.protein)}g pro · ${Math.round(m.fiber||0)}g fiber`)
            ),
            h("span",{style:{fontSize:11,color:D.muted,flexShrink:0,marginLeft:8}},displayTime(m.meal_time))
          )
        )
      )
    ),

    h("div",{style:{textAlign:"center",fontSize:11,color:"#2a2a26",marginTop:"1.5rem",paddingBottom:"2rem"}},
      `Say "log that" in Claude after any meal · /workout in bot to log activity`)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
