*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.bg-anim{transform-box:fill-box;animation-timing-function:ease-in-out;animation-iteration-count:infinite}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0f0f0d}

function capsulePath(x1,y1,x2,y2,r){
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len, px=-uy, py=ux;
  const ax=x1+px*r, ay=y1+py*r, bx=x2+px*r, by=y2+py*r;
  const cx2=x2-px*r, cy2=y2-py*r, dx2=x1-px*r, dy2=y1-py*r;
  return `M${ax} ${ay} L${bx} ${by} A${r} ${r} 0 0 1 ${cx2} ${cy2} L${dx2} ${dy2} A${r} ${r} 0 0 1 ${ax} ${ay} Z`;
}
function BodyFigureDefs(){
  // One shared, globally-referenced set of gradients — keeps every per-exercise
  // SVG lightweight (no per-card defs duplication) while giving capsules a
  // subtle cylindrical / 3D shaded look.
  const grads = Object.entries(BODY_GROUP_COLORS).map(([key,{c,dark}])=>
    h("linearGradient",{key,id:`bg-${key}`,x1:"0",y1:"0",x2:"1",y2:"1"},
      h("stop",{offset:"0%",stopColor:c}),
      h("stop",{offset:"100%",stopColor:dark})
    )
  );
  return h("svg",{width:0,height:0,style:{position:"absolute"}},
    h("defs",null,
      ...grads,
      h("linearGradient",{id:"bg-neutral",x1:"0",y1:"0",x2:"1",y2:"1"},
        h("stop",{offset:"0%",stopColor:"#f0efe8"}),h("stop",{offset:"100%",stopColor:"#8a8a82"})),
      h("radialGradient",{id:"bg-head",cx:"35%",cy:"30%",r:"75%"},
        h("stop",{offset:"0%",stopColor:"#fbfaf5"}),h("stop",{offset:"100%",stopColor:"#9a9a90"}))
    )
  );
}

}
function NeutralLimb({x1,y1,x2,y2,r=6}){
  return h("path",{d:capsulePath(x1,y1,x2,y2,r),fill:"url(#bg-neutral)"});

function BodyJoint({x,y,r=3.5,group="chest"}){

function GroundShadow({cx,cy,rx=34,ry=5}){

function Sparkline({series, target, color, height=26}){
  const w=300, n=series.length;
  if(!n) return null;
  const maxV = Math.max(target||0, ...series, 1);
  const yOf = v => height - Math.min(v/maxV,1)*height;
  const pts = series.map((v,i)=> `${n>1?(i/(n-1))*w:w/2},${yOf(v)}`).join(" ");
  const targetY = target>0 ? yOf(target) : null;
  const lastX = n>1?w:w/2, lastY = yOf(series[n-1]);
  return h("svg",{viewBox:`0 0 ${w} ${height}`,width:"100%",height,preserveAspectRatio:"none",style:{display:"block",overflow:"visible"}},
    targetY!=null && h("line",{x1:0,y1:targetY,x2:w,y2:targetY,stroke:D.border,strokeWidth:1,strokeDasharray:"3,3"}),
    h("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:1.8,strokeLinejoin:"round",strokeLinecap:"round"}),
    h("circle",{cx:lastX,cy:lastY,r:2.3,fill:color})
  );
}
function FigureFrame({h:vbh=120, caption, children}){

// ── time helpers ───────────────────────────────────────────────
function todayStr(){
  const now = new Date();
  const ist = new Date(now.getTime() + 5.5*60*60*1000);
  if(ist.getUTCHours() < 4) ist.setUTCDate(ist.getUTCDate() - 1);
  return ist.toISOString().split("T")[0];
}
function fmtDate(d){ return new Date(d+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"}); }
function fmtTime(){ return new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}); }
function displayTime(t){
  if(!t) return "";
  if(/[AP]M/i.test(t)) return t;
  const [hh,mm] = t.split(":").map(Number);
  return `${hh%12||12}:${String(mm).padStart(2,"0")} ${hh>=12?"PM":"AM"}`;
}

function Ring({value,target,color,track,size=88,sw=8}){
  const r=(size-sw)/2, circ=2*Math.PI*r;
  const rawPct=value/target, isOver=rawPct>1;
  const mainPct=Math.min(rawPct,1), overPct=isOver?Math.min(rawPct-1,1):0;
  const textColor=isOver?"#ff9f43":color;
  const overflowArc=isOver&&overPct>0?h("circle",{cx:size/2,cy:size/2,r,fill:"none",
    stroke:color,strokeWidth:sw,strokeLinecap:"round",
    strokeDasharray:circ,strokeDashoffset:circ*(1-overPct),
    transform:`rotate(-90 ${size/2} ${size/2})`,
    style:{transition:"stroke-dashoffset 0.8s ease"}}):null;
  return h("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block"}},
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:track,strokeWidth:sw}),
    h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:sw,
      strokeLinecap:isOver?"butt":"round",
      strokeDasharray:circ,strokeDashoffset:circ*(1-mainPct),
      transform:`rotate(-90 ${size/2} ${size/2})`,
      style:{transition:"stroke-dashoffset 0.8s ease",opacity:isOver?0.75:1}}),
    overflowArc,
    h("text",{x:size/2,y:size/2+5,textAnchor:"middle",fontSize:"12",fontWeight:"500",fill:textColor},
      Math.round(rawPct*100)+"%")
  );
}

// ── MonthCalendar ──────────────────────────────────────────────
function MonthCalendar({ month, onPrev, onNext, getCellBg, getCellContent, today, minMonth, onDayClick }){
  const [y, mo] = month.split("-").map(Number);
  const monthLabel = new Date(y, mo-1, 1).toLocaleDateString("en-IN", {month:"short", year:"numeric"});
  const firstDow = (new Date(y, mo-1, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(y, mo, 0).getDate();
  const moStr = String(mo).padStart(2,"0");
  const dayKeys = Array.from({length:daysInMonth}, (_,i)=>`${y}-${moStr}-${String(i+1).padStart(2,"0")}`);
  const cells = [...Array(firstDow).fill(null), ...dayKeys];
  const curMonth = today.slice(0,7);
  const atMax = month >= curMonth;
  const atMin = !!minMonth && month <= minMonth;
  const navBtn = (lbl, cb, dis) => h("button", {onClick:cb, disabled:dis, style:{
    background:"transparent", border:`0.5px solid ${D.border}`,
    color:dis?D.hint:D.muted, borderRadius:6, padding:"1px 9px",
    fontSize:12, cursor:dis?"not-allowed":"pointer", lineHeight:1.6,
  }}, lbl);
  return h("div", {style:{maxWidth:230,margin:"0 auto"}},
    h("div", {style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}},
      navBtn("‹", onPrev, atMin),
      h("span", {style:{fontSize:11,fontWeight:500,color:D.text}}, monthLabel),
      navBtn("›", onNext, atMax)
    ),
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}},
      ...["M","T","W","T","F","S","S"].map((d,i)=>h("div",{key:i,style:{textAlign:"center",fontSize:7,color:D.muted,fontWeight:500}},d))
    ),
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}},
      ...cells.map((key,i)=>{
        if(!key) return h("div",{key:"e"+i,style:{aspectRatio:"1"}});
        const dayNum = parseInt(key.split("-")[2]);
        const bg = getCellBg(key);
        const content = getCellContent ? getCellContent(key) : null;
        const isToday = key===today, isFuture = key>today;
        const clickable = onDayClick && !isFuture;
        return h("div",{key, title:key, onClick:clickable?()=>onDayClick(key):undefined, style:{
          aspectRatio:"1", borderRadius:3,
          background: isFuture?"transparent":bg,
          border: isToday?`1.5px solid ${D.accent}`:isFuture?`0.5px solid ${D.hint}`:"none",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          overflow:"hidden",
          cursor: clickable?"pointer":"default",
        }},
          !isFuture&&content
            ? h("span",{style:{fontSize:8,lineHeight:1}},content)
            : h("span",{style:{
                fontSize:6, lineHeight:1,
                color: isFuture?"#1e1e1b":bg===D.hint?"#3a3a36":"rgba(255,255,255,0.5)",
              }}, dayNum)
        );
      })
    )
  );
}

function calcNutStreak(byDate, cheatDays){
  const GOOD_PRO = TARGETS.protein * 0.6;
  const isGoodDay = k => {
    if(cheatDays.has(k)) return true;
    const m = byDate[k]||[];
    return m.length >= 2 && m.reduce((s,x)=>s+(x.protein||0),0) >= GOOD_PRO;
  };
  const today = todayStr();
  const todayDt = new Date(today+"T12:00:00");
  let streak=0;
  const startI = isGoodDay(today)?0:1;
  for(let i=startI;i<90;i++){
    const d=new Date(todayDt); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    if(isGoodDay(k)) streak++; else break;
  }
  return streak;
}

function calcActStreak(actByDate){
  const isValid = k => (actByDate[k]||[]).some(a=>a.calories_burned>=ACT_MIN);
  const today = todayStr();
  const todayDt = new Date(today+"T12:00:00");
  let streak=0;
  const startI = isValid(today)?0:1;
  for(let i=startI;i<90;i++){
    const d=new Date(todayDt); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    if(isValid(k)) streak++; else break;
  }
  return streak;
}

// ── Body Goals: completion, streak, progression ─────────────────
function bodySetTotals(daySets){
  // sums logged values per exercise for one day's array of body_sets rows
  const totals={};
  (daySets||[]).forEach(s=>{ totals[s.exercise]=(totals[s.exercise]||0)+(s.value||0); });
  return totals;
}
function bodyDailySeries(exKey, domainKeys, bodyByDate){
  return domainKeys.map(k => bodySetTotals(bodyByDate[k]||[])[exKey] || 0);
}
function dailyCompletion(daySets, targets){
  const totals=bodySetTotals(daySets);
  const active=Object.entries(targets).filter(([,t])=>t>0);
  if(!active.length) return 0;
  const sum=active.reduce((s,[ex,t])=>s+Math.min((totals[ex]||0)/t,1),0);
  return sum/active.length;
}
function calcBodyStreak(bodyByDate, targets){
  const isGood = k => dailyCompletion(bodyByDate[k]||[], targets) >= BODY_GOOD_DAY_PCT;
  const today = todayStr();
  const todayDt = new Date(today+"T12:00:00");
  let streak=0;
  const startI = isGood(today)?0:1;
  for(let i=startI;i<90;i++){
    const d=new Date(todayDt); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    if(isGood(k)) streak++; else break;
  }
  return streak;
}
function last7Keys(today){
  const todayDt=new Date(today+"T12:00:00");
  return Array.from({length:7},(_,i)=>{ const d=new Date(todayDt); d.setDate(d.getDate()-(6-i)); return d.toISOString().split("T")[0]; });
}
// Returns the block/stage index the data justifies advancing to (purely derived,
// caller decides whether/when to persist it to settings).
function computeBlockAdvance(bodyByDate, blockIndex, blockEnteredAt, today){
  if(blockIndex>=WEEK_BLOCKS.length-1) return blockIndex;
  const minDays = WEEK_BLOCKS[blockIndex].minDays;
  const elapsed = Math.floor((new Date(today+"T12:00:00") - new Date(blockEnteredAt+"T12:00:00"))/86400000);
  if(elapsed < minDays) return blockIndex;
  const targets = WEEK_BLOCKS[blockIndex].targets;
  const goodCount = last7Keys(today).filter(k=>dailyCompletion(bodyByDate[k]||[],targets) >= BODY_ADVANCE_PCT).length;
  return goodCount >= BODY_ADVANCE_DAYS ? blockIndex+1 : blockIndex;
}
function computePullupStageAdvance(bodyByDate, stageIndex, stageEnteredAt, today){
  if(stageIndex>=PULLUP_STAGES.length-1) return stageIndex;
  const totalsFor = k => bodySetTotals(bodyByDate[k]||[]);
  if(stageIndex===0){
    const elapsed = Math.floor((new Date(today+"T12:00:00") - new Date(stageEnteredAt+"T12:00:00"))/86400000);
    if(elapsed<21) return 0;
    const hitDays = last7Keys(today).filter(k=>(totalsFor(k).negative_pullup||0) >= 10).length;
    return hitDays>=5 ? 1 : 0;
  }
  if(stageIndex===1){
    const everLoggedFull = Object.values(bodyByDate).some(rows=>(rows||[]).some(s=>s.exercise==="full_pullup" && s.value>0));
    return everLoggedFull ? 2 : 1;
  }
  if(stageIndex===2){
    const maxSingleDay = Math.max(0, ...Object.keys(bodyByDate).map(k=>totalsFor(k).full_pullup||0));
    return maxSingleDay>=3 ? 3 : 2;
  }
  return stageIndex;
}

        h("div",{style:card},

          h(MonthCalendar,{

          h("div",{style:{display:"flex",gap:10,marginTop:10,flexWrap:"wrap",justifyContent:"center"}},

              h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
                ...Object.entries(blk.targets).filter(([,t])=>t>0).map(([exKey,t])=>
                  h(Pill,{key:exKey,label:`${BODY_EXERCISES[exKey].icon} ${t}${BODY_EXERCISES[exKey].unit==="sec"?"s":""}`,color:D.muted,bg:D.hint})
                )
              )
            )
          )
        ),
        h("div",{style:card},
          h("div",{style:sHead},"Pull-up roadmap"),
          ...PULLUP_STAGES.map((st,i)=>
            h("div",{key:i,style:{display:"flex",gap:12,padding:"0.6rem 0",borderBottom:i<PULLUP_STAGES.length-1?`0.5px solid ${D.border}`:"none"}},
              h("div",{style:{width:28,height:28,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:600,
                background:i===pullupStageIndex?D.accent:D.hint,color:i===pullupStageIndex?D.accentText:D.muted}},i+1),
              h("div",null,
                h("div",{style:{fontSize:13,fontWeight:500,color:D.text,marginBottom:2}},st.label),
                h("div",{style:{fontSize:12,color:D.muted,lineHeight:1.5,marginBottom:4}},st.desc),
                h("div",{style:{fontSize:11,color:D.accent,fontFamily:"'DM Mono',monospace"}},st.target)
              )
            )
          )
        )
      ),

      // ── Body Goals: Plan ───────────────────────────────────
      bodyTab==="plan"&&h("div",null,
        h("div",{style:{...card,display:"flex",gap:10,alignItems:"flex-start"}},
          h("span",{style:{fontSize:18}},"⚡"),
          h("div",{style:{fontSize:12,color:D.muted,lineHeight:1.6}},
            h("strong",{style:{color:D.text,fontWeight:500}},"The one rule: "),
            "Never go to failure. Stop 2 reps early every single set — this is what makes greasing the groove work, letting you do it 4× a day without recovery debt."
          )
        ),
        ...BODY_GROUP_ORDER.map(grp=>
          h("div",{key:grp},
            h("div",{style:{...sHead,marginTop:8}},BODY_GROUP_LABELS[grp]),
            ...Object.entries(BODY_EXERCISES).filter(([,ex])=>ex.group===grp).map(([exKey,ex])=>
              h("div",{key:exKey,style:{...card,padding:0,overflow:"hidden"}},
                h("div",{style:{display:"flex"}},
                  h("div",{style:{width:110,height:110,flexShrink:0,background:D.hint}},
                    h(BodyExerciseFigure,{exercise:exKey})
                  ),
                  h("div",{style:{flex:1,padding:"0.8rem 0.9rem"}},
                    h("div",{style:{fontSize:13,fontWeight:500,color:D.text,marginBottom:4}},ex.label),
                    h("div",{style:{fontSize:11,color:D.muted}},
                      `Current target: ${currentTargets[exKey]>0?currentTargets[exKey]+(ex.unit==="sec"?"s":" reps"):"🔒 locked"}`)
                  )
                )
              )
            )
          )
        )
      )
      )
    ),

    // ═══════════════════════════════════════════════════════
    // LOG TAB — manual logging UI, full parity with bot.py write commands
    // ═══════════════════════════════════════════════════════
    !loading&&mainTab==="log"&&h("div",{className:"fade"},

      logMsg&&h("div",{style:{...card,background:"#0f1f0a",border:`0.5px solid #2a4a1a`,color:D.accent,fontSize:12,textAlign:"center",padding:"8px 12px"}},logMsg),

      // Log a meal
      h("div",{style:card},
        h("div",{style:sHead},"Log a meal"),
        h(LogMealForm,{onSubmit:submitMeal, busy:logBusy})
      ),

      // Log a workout
      h("div",{style:card},
        h("div",{style:sHead},"Log a workout"),
        h(LogWorkoutForm,{onSubmit:submitWorkout, busy:logBusy})
      ),

      // Quick actions
      h("div",{style:{...card,display:"flex",gap:8,flexWrap:"wrap"}},
        h("button",{onClick:undoLastMeal,style:{flex:"1 1 auto",background:"transparent",border:`0.5px solid ${D.border}`,color:D.muted,borderRadius:8,padding:"8px",fontSize:12}},"↩️ Undo last meal"),
        h("button",{onClick:copyYesterdayHandler,disabled:logBusy,style:{flex:"1 1 auto",background:"transparent",border:`0.5px solid ${D.border}`,color:D.muted,borderRadius:8,padding:"8px",fontSize:12,opacity:logBusy?0.6:1}},"📋 Copy yesterday's meals"),
        h("button",{onClick:toggleCheatDay,style:{flex:"1 1 auto",background:cheatDays.has(today)?"#6b4fa0":"transparent",border:`0.5px solid ${cheatDays.has(today)?"#6b4fa0":D.border}`,color:cheatDays.has(today)?"#fff":D.muted,borderRadius:8,padding:"8px",fontSize:12}},
          cheatDays.has(today)?"❄️ Remove cheat day":`❄️ Mark today a cheat day (${freezeBal} left)`)
      ),

      // Today's meals — edit/delete
      h("div",{style:card},
        h("div",{style:sHead},"Today's meals"),
        viewMeals.length===0
          ?h(Empty,{icon:"🥗",text:"No meals logged yet today."})
          :viewMeals.map(m=>h(LogMealRow,{
              key:m.id, meal:m, editing:editMealId===m.id,
              onEditStart:()=>setEditMealId(m.id), onEditCancel:()=>setEditMealId(null),
              onSave:saveMealEdit, onDelete:deleteMeal
            }))
      ),

      // Today's activities — delete
      h("div",{style:card},
        h("div",{style:sHead},"Today's activities"),
        acts.length===0
          ?h(Empty,{icon:"🏃",text:"No activities logged yet today."})
          :acts.map(a=>h("div",{key:a.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`0.5px solid ${D.border}`}},
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("span",{style:{fontSize:16}},actIcon(a.activity)),
                h("div",null,
                  h("div",{style:{fontSize:13,color:D.text}},a.activity.charAt(0).toUpperCase()+a.activity.slice(1)),
                  h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},`${a.duration_minutes}min · ${a.intensity} · ${a.calories_burned} kcal`)
                )
              ),
              h("button",{onClick:()=>deleteActivityEntry(a.id),style:{background:"transparent",border:`0.5px solid #5a2a2a`,color:"#d08080",borderRadius:7,padding:"4px 9px",fontSize:11,flexShrink:0}},"🗑")
            ))
      ),

      // Presets
      h("div",{style:card},
        h("div",{style:sHead},"Presets"),
        presets.length===0
          ?h("div",{style:{fontSize:12,color:D.muted,marginBottom:10}},"No saved presets yet.")
          :presets.map(p=>h("div",{key:p.name,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`0.5px solid ${D.border}`}},
              h("div",null,
                h("div",{style:{fontSize:13,color:D.text,fontWeight:500}},p.name),
                h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},
                  `${Math.round(p.cal)} kcal · ${Math.round(p.protein)}g pro · ${Math.round(p.carbs)}g carb · ${Math.round(p.fat)}g fat · ${Math.round(p.fiber||0)}g fiber`)
              ),
              h("div",{style:{display:"flex",gap:5,flexShrink:0}},
                h("button",{onClick:()=>logFromPreset(p),disabled:logBusy,style:{background:D.accent,color:D.accentText,border:"none",borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:600}},"Log"),
                h("button",{onClick:()=>deletePresetHandler(p.name),style:{background:"transparent",border:`0.5px solid #5a2a2a`,color:"#d08080",borderRadius:7,padding:"5px 9px",fontSize:11}},"🗑")
              )
            )),
        h("div",{style:{marginTop:presets.length?12:0,paddingTop:presets.length?12:0,borderTop:presets.length?`0.5px solid ${D.border}`:"none"}},
          h(SavePresetForm,{onSave:savePresetHandler, busy:logBusy})
        )
      )
    ),

    // ═══════════════════════════════════════════════════════
    // SUMMARY TAB
    // ═══════════════════════════════════════════════════════
    !loading&&mainTab==="summary"&&h("div",{className:"fade"},
      // All 3 streaks
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},
        h("div",{style:{...card,marginBottom:0,padding:"0.8rem 0.7rem",borderColor:nutStreak>0?"#3a5a20":D.border}},
          h("div",{style:{fontSize:10,color:D.muted,marginBottom:5}},"🥗 Nutrition"),
          h("div",{style:{fontSize:21,fontWeight:600,color:nutStreak>0?COLORS.protein:D.muted}},
            nutStreak,h("span",{style:{fontSize:11,fontWeight:400,color:D.muted,marginLeft:2}},"d")),
          h("div",{style:{fontSize:10,color:D.muted,marginTop:2}},`❄️${freezeBal}/2`)
        ),
        h("div",{style:{...card,marginBottom:0,padding:"0.8rem 0.7rem",borderColor:actStreak>0?"#3a2a5a":D.border}},
          h("div",{style:{fontSize:10,color:D.muted,marginBottom:5}},"🏃 Activity"),
          h("div",{style:{fontSize:21,fontWeight:600,color:actStreak>0?COLORS.act:D.muted}},
            actStreak,h("span",{style:{fontSize:11,fontWeight:400,color:D.muted,marginLeft:2}},"d")),
          h("div",{style:{fontSize:10,color:D.muted,marginTop:2}},`❄️${actFreezeBal}/2`)
        ),
        h("div",{style:{...card,marginBottom:0,padding:"0.8rem 0.7rem",borderColor:bodyStreak>0?"#5a4a1a":D.border}},
          h("div",{style:{fontSize:10,color:D.muted,marginBottom:5}},"💪 Body"),
          h("div",{style:{fontSize:21,fontWeight:600,color:bodyStreak>0?D.accent:D.muted}},
            bodyStreak,h("span",{style:{fontSize:11,fontWeight:400,color:D.muted,marginLeft:2}},"d")),
          h("div",{style:{fontSize:10,color:D.muted,marginTop:2}},`❄️${bodyFreezeBal}/2`)
        )
      ),

      // Compact macro rings
      h("div",{style:{...card,padding:"1.25rem 1rem"}},
        h("div",{style:{...sHead,marginBottom:12}},"Today — nutrition"),
        h("div",{style:{display:"flex",justifyContent:"space-around",gap:8}},
          ...[
            {key:"cal",    label:"Cal",   unit:"kcal",color:COLORS.cal,    track:COLORS.calBg},
            {key:"protein",label:"Pro",   unit:"g",   color:COLORS.protein,track:COLORS.proteinBg},
            {key:"carbs",  label:"Carbs", unit:"g",   color:COLORS.carbs,  track:COLORS.carbsBg},
            {key:"fat",    label:"Fat",   unit:"g",   color:COLORS.fat,    track:COLORS.fatBg},
            {key:"fiber",  label:"Fiber", unit:"g",   color:COLORS.fiber,  track:COLORS.fiberBg},
          ].map(({key,label,unit,color,track})=>
            h("div",{key,style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flex:"1 1 0"}},
              h(Ring,{value:totals[key],target:TARGETS[key],color,track,size:60,sw:6}),
              h("div",{style:{fontSize:10,color:D.muted}},label)
            )
          )
        ),
        // Done / left numbers — same footprint as the old single sentence, now covers all 5 metrics
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginTop:10}},
          ...[
            {label:"Cal",  done:totals.cal,    target:TARGETS.cal,    unit:""},
            {label:"Pro",  done:totals.protein,target:TARGETS.protein,unit:"g"},
            {label:"Carb", done:totals.carbs,  target:TARGETS.carbs,  unit:"g"},
            {label:"Fat",  done:totals.fat,    target:TARGETS.fat,    unit:"g"},
            {label:"Fiber",done:totals.fiber,  target:TARGETS.fiber,  unit:"g"},
          ].map(({label,done,target,unit})=>{
            const left=Math.max(Math.round(target-done),0);
            return h("span",{key:label,style:{fontSize:10,color:D.muted,background:D.surface,borderRadius:7,padding:"3px 8px"}},
              `${label} ${Math.round(done)}${unit} done · ${left}${unit} left`);
          })
        )
      ),

      // Activity summary
      h("div",{style:card},
        h("div",{style:{...sHead,marginBottom:12}},"Today — activity"),
        acts.length===0
          ?h("div",{style:{fontSize:13,color:D.muted,padding:"8px 0"}},"No activities logged today.")
          :h("div",null,
              acts.map((a,i)=>h("div",{key:a.id||i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom:i<acts.length-1?`0.5px solid ${D.border}`:"none"}},
                h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("span",{style:{fontSize:16}},actIcon(a.activity)),
                  h("span",{style:{fontSize:13,color:D.text}},
                    a.activity.charAt(0).toUpperCase()+a.activity.slice(1),
                    h("span",{style:{fontSize:11,color:D.muted,marginLeft:6}},`${a.duration_minutes}min · ${a.intensity}`)
                  )
                ),
                h("span",{style:{fontSize:13,fontWeight:500,color:(a.calories_burned||0)>=ACT_MIN?COLORS.act:D.muted}},
                  `${a.calories_burned} kcal`)
              ))
          )
      ),

      // Body Goals summary
      h("div",{style:card},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("div",{style:{...sHead,marginBottom:0}},"Today — body goals"),
          h("span",{style:{fontSize:11,color:D.muted}},WEEK_BLOCKS[blockIndex].label)
        ),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",{style:{fontSize:22,fontWeight:600,color:viewBodyCompletion>=BODY_GOOD_DAY_PCT?D.accent:D.text}},
            Math.round(viewBodyCompletion*100),h("span",{style:{fontSize:12,color:D.muted,fontWeight:400,marginLeft:2}},"% complete")),
          h("div",{style:{fontSize:11,color:D.muted,textAlign:"right"}},
            `💪 ${bodyStreak}d streak`,h("br"),`🆙 ${PULLUP_STAGES[pullupStageIndex].label}`)
        )
      ),

      // Net calories card
      (()=>{
        const net = Math.round(totals.cal - actTotals.burned);
        const netColor = net > TARGETS.cal ? "#ff9f43" : net < TARGETS.cal * 0.5 ? COLORS.protein : COLORS.cal;
        return h("div",{style:{...card,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Consumed"),
            h("div",{style:{fontSize:18,fontWeight:600,color:COLORS.cal}},Math.round(totals.cal)),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          ),
          h("div",{style:{textAlign:"center",borderLeft:`0.5px solid ${D.border}`,borderRight:`0.5px solid ${D.border}`}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Burned"),
            h("div",{style:{fontSize:18,fontWeight:600,color:COLORS.act}},actTotals.burned),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          ),
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{fontSize:11,color:D.muted,marginBottom:4}},"Net"),
            h("div",{style:{fontSize:18,fontWeight:600,color:netColor}},net),
            h("div",{style:{fontSize:10,color:D.muted}},"kcal")
          )
        );
      })(),

      // Meal list (compact)
      viewMeals.length>0&&h("div",{style:card},
        h("div",{style:sHead},`${viewMeals.length} meal${viewMeals.length!==1?"s":""} logged`),
        viewMeals.map((m,i)=>
          h("div",{key:m.id||i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:i<viewMeals.length-1?`0.5px solid ${D.border}`:"none"}},
            h("div",null,
              h("div",{style:{fontSize:13,color:D.text}},m.name),
              h("div",{style:{fontSize:11,color:D.muted,marginTop:2}},
                `${Math.round(m.cal)} kcal · ${Math.round(m.protein)}g pro · ${Math.round(m.fiber||0)}g fiber`)
            ),
            h("span",{style:{fontSize:11,color:D.muted,flexShrink:0,marginLeft:8}},displayTime(m.meal_time))
          )
        )
      )
    ),

    h("div",{style:{textAlign:"center",fontSize:11,color:"#2a2a26",marginTop:"1.5rem",paddingBottom:"2rem"}},
      `Say "log that" in Claude after any meal · /workout in bot to log activity`)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
